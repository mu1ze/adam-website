<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanoid Walker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
        }
        #canvas { display: block; }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff88;
            border-radius: 12px;
            padding: 10px;
            z-index: 100;
            transition: all 0.3s;
        }
        
        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
        }
        .controls-header span {
            color: #00ff88;
            font-size: 14px;
        }
        .toggle-btn {
            background: #00ff88;
            border: none;
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        .toggle-btn.open {
            transform: rotate(180deg);
        }
        
        .controls-buttons {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 10px;
        }
        .controls-buttons.open {
            display: flex;
        }
        
        .controls button {
            background: #00ff88;
            border: none;
            color: #000;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 60px;
        }
        .controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        .controls button.active {
            background: #ff6b6b;
        }
        
        @media (min-width: 768px) {
            .controls {
                padding: 15px 25px;
            }
            .controls-buttons {
                max-height: none !important;
                overflow: visible !important;
            }
            .toggle-btn {
                display: none;
            }
            .controls-header {
                display: none;
            }
            .controls button {
                padding: 10px 18px;
                min-width: auto;
            }
        }
        
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ff88;
            z-index: 50;
        }
        .info h1 {
            font-size: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        .info p {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            z-index: 50;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #00ff88;
            color: #000;
        }
        
        .animation-name {
            position: fixed;
            top: 70px;
            right: 20px;
            color: #ff6b6b;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 6px;
        }
        
        @media (min-width: 768px) {
            .animation-name {
                top: 20px;
                font-size: 18px;
            }
            .info h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>🚶 Humanoid Walker</h1>
        <p>Drag to rotate • Scroll to zoom</p>
    </div>
    <a href="index.html" class="back-btn">← Back to ADAM</a>
    <div class="animation-name" id="animName">SELECT AN ANIMATION</div>
    
    <canvas id="canvas"></canvas>
    
    <div class="controls" id="controlsPanel">
        <div class="controls-header" onclick="toggleControls()">
            <span>🎮 Animations</span>
            <button class="toggle-btn" id="toggleBtn">▼</button>
        </div>
        <div class="controls-buttons" id="controlsButtons">
            <button id="stopBtn" class="active" onclick="setAnimation('stop')">⏹ Stop</button>
            <button id="walkBtn" onclick="setAnimation('walk')">🚶 Walk</button>
            <button id="runBtn" onclick="setAnimation('run')">🏃 Run</button>
            <button id="danceBtn" onclick="setAnimation('dance')">💃 Dance</button>
            <button id="waveBtn" onclick="setAnimation('wave')">👋 Wave</button>
            <button id="idleBtn" onclick="setAnimation('idle')">😴 Idle</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls;
        let humanoid;
        let animationTime = 0;
        let currentAnimation = 'stop';
        let animationSpeed = 1;
        
        // Body parts
        let torso, head, leftArm, rightArm, leftLeg, rightLeg;
        let leftForearm, rightForearm, leftShin, rightShin;
        
        init();
        animate();
        
        function createHumanoid() {
            humanoid = new THREE.Group();
            
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.8 });
            const shirtMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.6 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7 });
            const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
            
            // Torso
            torso = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.7, 0.25),
                shirtMat
            );
            torso.position.y = 1.1;
            humanoid.add(torso);
            
            // Head
            head = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 16, 16),
                skinMat
            );
            head.position.y = 1.7;
            humanoid.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat);
            leftEye.position.set(-0.06, 1.73, 0.15);
            humanoid.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat);
            rightEye.position.set(0.06, 1.73, 0.15);
            humanoid.add(rightEye);
            
            // Upper Arms
            leftArm = new THREE.Mesh(
                new THREE.BoxGeometry(0.12, 0.4, 0.12),
                shirtMat
            );
            leftArm.position.set(-0.38, 1.25, 0);
            humanoid.add(leftArm);
            
            rightArm = new THREE.Mesh(
                new THREE.BoxGeometry(0.12, 0.4, 0.12),
                shirtMat
            );
            rightArm.position.set(0.38, 1.25, 0);
            humanoid.add(rightArm);
            
            // Forearms
            leftForearm = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.35, 0.1),
                skinMat
            );
            leftForearm.position.set(-0.38, 0.85, 0);
            humanoid.add(leftForearm);
            
            rightForearm = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.35, 0.1),
                skinMat
            );
            rightForearm.position.set(0.38, 0.85, 0);
            humanoid.add(rightForearm);
            
            // Upper Legs
            leftLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.16, 0.45, 0.16),
                pantsMat
            );
            leftLeg.position.set(-0.12, 0.55, 0);
            humanoid.add(leftLeg);
            
            rightLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.16, 0.45, 0.16),
                pantsMat
            );
            rightLeg.position.set(0.12, 0.55, 0);
            humanoid.add(rightLeg);
            
            // Shins
            leftShin = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.4, 0.14),
                pantsMat
            );
            leftShin.position.set(-0.12, 0.15, 0);
            humanoid.add(leftShin);
            
            rightShin = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.4, 0.14),
                pantsMat
            );
            rightShin.position.set(0.12, 0.15, 0);
            humanoid.add(rightShin);
            
            // Feet
            const leftFoot = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.08, 0.24),
                shoeMat
            );
            leftFoot.position.set(-0.12, -0.04, 0.04);
            humanoid.add(leftFoot);
            
            const rightFoot = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.08, 0.24),
                shoeMat
            );
            rightFoot.position.set(0.12, -0.04, 0.04);
            humanoid.add(rightFoot);
            
            scene.add(humanoid);
        }
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 4);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 1, 0);
            
            // Lights
            const ambient = new THREE.AmbientLight(0x404060, 0.8);
            scene.add(ambient);
            
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            sun.castShadow = true;
            scene.add(sun);
            
            const fill = new THREE.DirectionalLight(0x00ff88, 0.3);
            fill.position.set(-5, 5, -5);
            scene.add(fill);
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.08;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const grid = new THREE.GridHelper(20, 20, 0x00ff88, 0x0a0a1a);
            grid.position.y = -0.07;
            scene.add(grid);
            
            createHumanoid();
            
            window.addEventListener('resize', onResize);
        }
        
        function setAnimation(name) {
            currentAnimation = name;
            document.getElementById('animName').textContent = name.toUpperCase();
            
            // Update button states
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            if (name !== 'stop') {
                document.getElementById(name + 'Btn').classList.add('active');
            } else {
                document.getElementById('stopBtn').classList.add('active');
                // Reset all rotations to default pose
                resetPose();
            }
            
            animationTime = 0;
        }
        
        function toggleControls() {
            const buttons = document.getElementById('controlsButtons');
            const toggleBtn = document.getElementById('toggleBtn');
            buttons.classList.toggle('open');
            toggleBtn.classList.toggle('open');
        }
        
        function resetPose() {
            humanoid.rotation.set(0, 0, 0);
            torso.rotation.set(0, 0, 0);
            torso.scale.set(1, 1, 1);
            head.rotation.set(0, 0, 0);
            humanoid.position.set(0, 0, 0);
            
            leftArm.rotation.set(0, 0, 0);
            rightArm.rotation.set(0, 0, 0);
            leftForearm.rotation.set(0, 0, 0);
            rightForearm.rotation.set(0, 0, 0);
            leftLeg.rotation.set(0, 0, 0);
            rightLeg.rotation.set(0, 0, 0);
            leftShin.rotation.set(0, 0, 0);
            rightShin.rotation.set(0, 0, 0);
        }
        
        function animateStop(t) {
            // Just hold the reset pose
            resetPose();
        }
        
        function animateWalk(t) {
            const speed = animationSpeed;
            const swing = Math.sin(t * 8 * speed) * 0.5;
            
            // Arms swing opposite to legs
            leftArm.rotation.x = swing * 0.8;
            rightArm.rotation.x = -swing * 0.8;
            leftForearm.rotation.x = Math.max(0, swing * 0.5);
            rightForearm.rotation.x = Math.max(0, -swing * 0.5);
            
            // Legs
            leftLeg.rotation.x = -swing * 0.6;
            rightLeg.rotation.x = swing * 0.6;
            leftShin.rotation.x = Math.max(0, -swing * 0.8);
            rightShin.rotation.x = Math.max(0, swing * 0.8);
            
            // Bob
            humanoid.position.y = Math.abs(Math.sin(t * 16 * speed)) * 0.03;
            
            // Slight body rotation
            torso.rotation.z = Math.sin(t * 8 * speed) * 0.02;
        }
        
        function animateRun(t) {
            const speed = animationSpeed * 1.8;
            const swing = Math.sin(t * 12 * speed);
            
            // Arms pump
            leftArm.rotation.x = -swing * 1.2;
            rightArm.rotation.x = swing * 1.2;
            leftForearm.rotation.x = 0.5 + Math.sin(t * 12 * speed) * 0.5;
            rightForearm.rotation.x = 0.5 - Math.sin(t * 12 * speed) * 0.5;
            
            // Legs with more range
            leftLeg.rotation.x = -swing * 1.0;
            rightLeg.rotation.x = swing * 1.0;
            leftShin.rotation.x = Math.max(0, -swing * 1.2);
            rightShin.rotation.x = Math.max(0, swing * 1.2);
            
            // Higher bounce
            humanoid.position.y = Math.abs(Math.sin(t * 24 * speed)) * 0.08;
            
            // Body lean forward
            torso.rotation.x = 0.15;
        }
        
        function animateDance(t) {
            const beat = t * 4;
            
            // Groovy body movement
            torso.rotation.z = Math.sin(beat) * 0.3;
            torso.rotation.y = Math.cos(beat * 0.5) * 0.2;
            
            // Arms swing
            leftArm.rotation.z = -0.5 + Math.sin(beat) * 0.8;
            rightArm.rotation.z = 0.5 - Math.sin(beat) * 0.8;
            leftArm.rotation.x = Math.sin(beat * 2) * 0.3;
            rightArm.rotation.x = Math.cos(beat * 2) * 0.3;
            leftForearm.rotation.x = Math.sin(beat) * 0.5;
            rightForearm.rotation.x = Math.cos(beat) * 0.5;
            
            // Legs
            leftLeg.rotation.x = Math.sin(beat * 2) * 0.4;
            rightLeg.rotation.x = Math.cos(beat * 2) * 0.4;
            leftShin.rotation.x = Math.max(0, Math.sin(beat * 2)) * 0.5;
            rightShin.rotation.x = Math.max(0, Math.cos(beat * 2)) * 0.5;
            
            // Bounce
            humanoid.position.y = Math.abs(Math.sin(beat * 2)) * 0.05;
            
            // Head bob
            head.rotation.z = Math.sin(beat) * 0.1;
        }
        
        function animateWave(t) {
            const wave = Math.sin(t * 3);
            
            // Body idle sway
            torso.rotation.z = Math.sin(t * 2) * 0.05;
            
            // Right arm waves
            rightArm.rotation.x = -0.5;
            rightArm.rotation.z = 1.2;
            rightArm.rotation.y = Math.sin(t * 4) * 0.3;
            rightForearm.rotation.x = -0.3 + Math.sin(t * 6) * 0.4;
            rightForearm.rotation.z = 0.5;
            
            // Left arm down
            leftArm.rotation.x = 0.1;
            leftArm.rotation.z = -0.1;
            leftForearm.rotation.x = 0;
            
            // Legs idle
            leftLeg.rotation.x = 0;
            rightLeg.rotation.x = 0;
            leftShin.rotation.x = 0;
            rightShin.rotation.x = 0;
            
            // Head looks at you
            head.rotation.y = 0.3;
            head.rotation.x = 0;
            
            // Body shift weight
            torso.rotation.y = Math.sin(t * 2) * 0.1;
            humanoid.position.x = Math.sin(t * 2) * 0.05;
        }
        
        function animateIdle(t) {
            // Subtle breathing
            torso.scale.x = 1 + Math.sin(t * 2) * 0.02;
            torso.scale.z = 1 + Math.sin(t * 2) * 0.02;
            
            // Arms relaxed
            leftArm.rotation.x = 0.1;
            leftArm.rotation.z = 0.1;
            rightArm.rotation.x = 0.1;
            rightArm.rotation.z = -0.1;
            leftForearm.rotation.x = 0.2;
            rightForearm.rotation.x = 0.2;
            
            // Legs relaxed
            leftLeg.rotation.x = 0;
            rightLeg.rotation.x = 0;
            leftShin.rotation.x = 0;
            rightShin.rotation.x = 0;
            
            // Slight head droop
            head.rotation.x = 0.1;
            
            // Micro sway
            humanoid.rotation.y = Math.sin(t * 0.5) * 0.03;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            animationTime += 0.016 * animationSpeed;
            const t = animationTime;
            
            // Reset pose
            humanoid.rotation.x = 0;
            torso.rotation.set(0, 0, 0);
            head.rotation.set(0, 0, 0);
            humanoid.position.x = 0;
            
            switch(currentAnimation) {
                case 'stop': animateStop(t); break;
                case 'walk': animateWalk(t); break;
                case 'run': animateRun(t); break;
                case 'dance': animateDance(t); break;
                case 'wave': animateWave(t); break;
                case 'idle': animateIdle(t); break;
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
